name: release

# Public build on GitHub-hosted runners (no homelab CI involved). Two outputs:
#   - pack: PUG netcode libraries → NuGet packages on the GitHub Packages feed
#     (built-in GITHUB_TOKEN, no secret). Consumers add the feed:
#       dotnet nuget add source https://nuget.pkg.github.com/boxsie/index.json
#   - matchmaker-bundle: the PugPong matchmaker as an installable Ensemble
#     service bundle (ADR-0009) → attached to a GitHub Release, registered in
#     the ensemble registry as `pug-pong-matchmaker`.
#
# Cut a release:  git tag v0.1.1 && git push github v0.1.1
# (the tag drives both the package version and the bundle version).

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Package version tag to publish (e.g. v0.1.0)'
        required: true

permissions:
  contents: read
  packages: write

jobs:
  pack:
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      # net8/net9/net10 multi-target — the 10 SDK builds the down-level TFMs.
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Pack libraries
        run: |
          VERSION="${TAG#v}"
          for proj in src/PUG.Core src/PUG.Netcode src/PUG.Netcode.Prediction src/PUG.Ensemble src/PUG.Redis; do
            dotnet pack "$proj" -c Release -p:Version="$VERSION" -o nupkgs
          done

      - name: Push to GitHub Packages
        run: |
          dotnet nuget add source \
            --username "${{ github.actor }}" --password "${{ github.token }}" \
            --store-password-in-clear-text \
            --name github "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"
          dotnet nuget push "nupkgs/*.nupkg" --source github --api-key "${{ github.token }}" --skip-duplicate

  matchmaker-bundle:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # Self-contained linux-x64 publish of the PugPong matchmaker as an
      # installable Ensemble service bundle: the manifest + self-contained
      # binary at the archive ROOT (the daemon's installer reads
      # ensemble-service.yaml at the root — NOT inside a wrapper dir). The
      # file is named -linux-amd64 to match the registry's platform key.
      - name: Publish matchmaker bundle
        run: |
          VERSION="${TAG#v}"
          dotnet publish samples/PugPong/Matchmaker/PugPong.Matchmaker.csproj \
            -c Release -r linux-x64 --self-contained true -o bundle
          cp samples/PugPong/Matchmaker/ensemble-service.yaml bundle/
          sed -i "s/^version:.*/version: ${VERSION}/" bundle/ensemble-service.yaml
          tar -C bundle -czf "pug-pong-matchmaker-${VERSION}-linux-amd64.tar.gz" .

      - name: Attach to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$TAG" pug-pong-matchmaker-*-linux-amd64.tar.gz \
            --title "$TAG" --target "$GITHUB_SHA" --generate-notes \
          || gh release upload "$TAG" pug-pong-matchmaker-*-linux-amd64.tar.gz --clobber
