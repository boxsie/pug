syntax = "proto3";
package pug.ensemble.rpc;
option csharp_namespace = "PUG.Ensemble.Proto";

// Matchmaker RPC envelope. These messages are serialised to bytes and shipped
// over the Ensemble service-transport's SendBytesAsync — they are NOT gRPC
// service methods. The oneof on each top-level envelope lets PUG.Ensemble
// dispatch on message kind without needing message-type metadata in-band.

message MatchmakerRequest {
  oneof msg {
    JoinQueueRequest          join_queue           = 1;
    LeaveQueueRequest         leave_queue          = 2;
    CreatePrivateMatchRequest create_private_match = 3;
    JoinPrivateByCodeRequest  join_private_by_code = 4;
  }
}

message MatchmakerResponse {
  oneof msg {
    QueuedResponse        queued                = 1;
    QueueStatus           status                = 2;
    ErrorResponse         error                 = 3;
    PrivateMatchCreated   private_match_created = 4;
  }
}

message JoinQueueRequest {
  bytes  payload         = 1;  // host-supplied TPayload, serialised
  string private_game_id = 2;  // optional; for private-code joins
}

message LeaveQueueRequest {
  string session_id = 1;
}

message QueuedResponse {
  string session_id      = 1;
  string private_game_id = 2;  // empty unless this was a private flow
}

message QueueStatus {
  string session_id = 1;
  int32  position   = 2;  // 0 = unknown
  int64  waited_ms  = 3;
}

message ErrorResponse {
  string code    = 1;  // stable classifier, e.g. "unknown_code", "expired_code", "queue_closed"
  string message = 2;
}

message CreatePrivateMatchRequest {
  bytes payload = 1;
}

message JoinPrivateByCodeRequest {
  bytes  payload = 1;
  string code    = 2;
}

message PrivateMatchCreated {
  string session_id      = 1;
  string code            = 2;
  string private_game_id = 3;
}
